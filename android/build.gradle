buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.google.gms:google-services:4.4.2'
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Notifee: local Maven repo for app.notifee:core (required for @notifee/react-native)
def notifeeLibs = file("${rootDir}/../node_modules/@notifee/react-native/android/libs")
if (notifeeLibs.exists()) {
    allprojects { prj ->
        prj.repositories.maven { repo ->
            repo.url = notifeeLibs.toURI()
        }
    }
}
